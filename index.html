<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <meta name="description" content="Centro de Apps Docente - Desarrolladas por José R. White">
    <title>Centro de Apps Docente</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            animation: slideUp 0.8s ease-out;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .app-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            background: white;
        }

        .app-card:active {
            transform: translateY(-4px) scale(0.98);
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            color: white;
            box-shadow: 0 4px 8px rgba(16, 185, 129, 0.3);
        }

        .app-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #2d3748;
            word-break: break-word;
            line-height: 1.3;
        }

        .add-app-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 3rem;
            transition: all 0.3s ease;
        }

        .add-app-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
            transform: translateY(-8px) scale(1.02);
        }

        .add-app-btn .app-icon {
            background: transparent;
            box-shadow: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideUp 0.4s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            color: #2d3748;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #718096;
            transition: color 0.2s;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #2d3748;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #10b981;
        }

        .emoji-picker {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: #f7fafc;
            border-radius: 10px;
        }

        .icon-upload-section {
            margin-bottom: 15px;
        }

        .upload-btn {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .clear-image-btn {
            margin-left: 10px;
            padding: 8px 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-image-btn:hover {
            background: #dc2626;
        }

        #uploadedImagePreview {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f7fafc;
            border-radius: 10px;
        }

        .emoji-option {
            font-size: 1.8rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            text-align: center;
        }

        .emoji-option:hover {
            background: #e2e8f0;
            transform: scale(1.2);
        }

        .emoji-option.selected {
            background: #10b981;
            transform: scale(1.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-card:hover .delete-btn {
            opacity: 1;
        }

        .app-card {
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .apps-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 18px;
            }

            .app-icon {
                width: 70px;
                height: 70px;
                font-size: 2.2rem;
            }

            .app-name {
                font-size: 1rem;
            }

            .modal-content {
                padding: 25px 20px;
            }

            .emoji-picker {
                grid-template-columns: repeat(6, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 Centro de Apps Docente</h1>
        <p>Desarrolladas por José R. White</p>
    </div>

    <div class="container">
        <div class="apps-grid" id="appsGrid">
            <!-- Las apps se cargarán aquí -->
        </div>
    </div>

    <div class="modal" id="addAppModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Agregar Nueva App</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <form id="addAppForm" onsubmit="addApp(event)">
                <div class="form-group">
                    <label>Nombre de la App</label>
                    <input type="text" id="appName" required placeholder="Ej: Mi Calculadora">
                </div>

                <div class="form-group">
                    <label>URL de la App</label>
                    <input type="url" id="appUrl" required placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>Ícono (selecciona un emoji o sube una imagen)</label>
                    <div class="icon-upload-section">
                        <input type="file" id="iconUpload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                        <button type="button" class="upload-btn" onclick="document.getElementById('iconUpload').click()">
                            📷 Subir Imagen
                        </button>
                        <div id="uploadedImagePreview" style="display: none; margin-top: 10px;">
                            <img id="previewImg" style="width: 80px; height: 80px; border-radius: 12px; object-fit: cover;">
                            <button type="button" class="clear-image-btn" onclick="clearUploadedImage()">✕ Quitar</button>
                        </div>
                    </div>
                    <div class="emoji-picker" id="emojiPicker">
                        <!-- Emojis populares para apps -->
                    </div>
                    <input type="hidden" id="appIcon" required>
                    <input type="hidden" id="appIconType" value="emoji">
                </div>

                <button type="submit" class="btn-primary">Agregar App</button>
            </form>
        </div>
    </div>

    <script>
        // Emojis disponibles para las apps (expandido con temática académica)
        const emojis = [
            // Académico
            '📚', '📖', '✏️', '📝', '🎓', '🏫', '👨‍🏫', '👩‍🏫',
            '📊', '📈', '📉', '🔬', '🧪', '🧬', '🔭', '🌡️',
            '📐', '📏', '✂️', '📌', '📍', '🖊️', '🖍️', '🖌️',
            // Tecnología
            '💻', '🖥️', '⌨️', '🖱️', '📱', '💾', '💿', '📀',
            // Organización
            '📅', '📆', '🗓️', '📋', '📁', '📂', '🗂️', '📇',
            '✅', '☑️', '📌', '📍', '🔖', '🏷️', '📎', '🖇️',
            // Comunicación
            '✉️', '📧', '📨', '📩', '📤', '📥', '💬', '💭',
            // General
            '🎨', '🎭', '🎪', '🎬', '🎵', '🎸', '🎹', '🎤',
            '⚽', '🏀', '🏈', '⚾', '🎾', '🏐', '🏋️', '🤸',
            '🌍', '🌎', '🌏', '🗺️', '🧭', '⛰️', '🏔️', '🏕️',
            '⭐', '🌟', '✨', '💫', '🔥', '💡', '🔔', '🎯',
            '🎁', '🎉', '🎊', '🏆', '🥇', '🥈', '🥉', '🏅',
            '🔧', '🔨', '⚙️', '🛠️', '⚗️', '🧰', '🔑', '🗝️',
            '🍎', '🍏', '☕', '🍕', '🍔', '🌮', '🍰', '🎂',
            '🚀', '✈️', '🚁', '🚂', '🚗', '🚕', '🚙', '🏠'
        ];

        // Cargar apps desde localStorage
        let apps = JSON.parse(localStorage.getItem('myApps') || '[]');

        // Inicializar
        function init() {
            renderApps();
            renderEmojiPicker();
        }

        // Renderizar apps
        function renderApps() {
            const grid = document.getElementById('appsGrid');
            grid.innerHTML = '';

            apps.forEach((app, index) => {
                const card = document.createElement('a');
                card.className = 'app-card';
                card.href = app.url;
                card.target = '_blank';
                
                let iconHtml;
                if (app.iconType === 'image') {
                    iconHtml = `<div class="app-icon"><img src="${app.icon}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 18px;"></div>`;
                } else {
                    iconHtml = `<div class="app-icon">${app.icon}</div>`;
                }
                
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteApp(event, ${index})">×</button>
                    ${iconHtml}
                    <div class="app-name">${app.name}</div>
                `;
                grid.appendChild(card);
            });

            // Botón de agregar
            const addCard = document.createElement('div');
            addCard.className = 'app-card add-app-btn';
            addCard.onclick = openModal;
            addCard.innerHTML = `
                <div class="app-icon">+</div>
                <div class="app-name">Agregar App</div>
            `;
            grid.appendChild(addCard);
        }

        // Renderizar selector de emojis
        function renderEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.innerHTML = '';
            
            emojis.forEach(emoji => {
                const option = document.createElement('div');
                option.className = 'emoji-option';
                option.textContent = emoji;
                option.onclick = () => selectEmoji(emoji, option);
                picker.appendChild(option);
            });
        }

        // Seleccionar emoji
        function selectEmoji(emoji, element) {
            document.querySelectorAll('.emoji-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
            document.getElementById('appIcon').value = emoji;
            document.getElementById('appIconType').value = 'emoji';
            
            // Ocultar preview de imagen si existe
            document.getElementById('uploadedImagePreview').style.display = 'none';
        }

        // Manejar carga de imagen
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                
                // Mostrar preview
                document.getElementById('previewImg').src = base64Image;
                document.getElementById('uploadedImagePreview').style.display = 'flex';
                
                // Guardar la imagen
                document.getElementById('appIcon').value = base64Image;
                document.getElementById('appIconType').value = 'image';
                
                // Deseleccionar emojis
                document.querySelectorAll('.emoji-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
            };
            reader.readAsDataURL(file);
        }

        // Limpiar imagen subida
        function clearUploadedImage() {
            document.getElementById('iconUpload').value = '';
            document.getElementById('uploadedImagePreview').style.display = 'none';
            document.getElementById('appIcon').value = '';
            document.getElementById('appIconType').value = 'emoji';
        }

        // Abrir modal
        function openModal() {
            document.getElementById('addAppModal').classList.add('active');
            document.getElementById('addAppForm').reset();
            document.getElementById('appIcon').value = '';
            document.getElementById('appIconType').value = 'emoji';
            document.getElementById('uploadedImagePreview').style.display = 'none';
            document.querySelectorAll('.emoji-option').forEach(opt => {
                opt.classList.remove('selected');
            });
        }

        // Cerrar modal
        function closeModal() {
            document.getElementById('addAppModal').classList.remove('active');
        }

        // Agregar app
        function addApp(event) {
            event.preventDefault();
            
            const name = document.getElementById('appName').value;
            const url = document.getElementById('appUrl').value;
            const icon = document.getElementById('appIcon').value;
            const iconType = document.getElementById('appIconType').value;

            if (!icon) {
                alert('Por favor selecciona un ícono o sube una imagen');
                return;
            }

            apps.push({ name, url, icon, iconType });
            localStorage.setItem('myApps', JSON.stringify(apps));
            
            renderApps();
            closeModal();
        }

        // Eliminar app
        function deleteApp(event, index) {
            event.preventDefault();
            event.stopPropagation();
            
            if (confirm('¿Eliminar esta app?')) {
                apps.splice(index, 1);
                localStorage.setItem('myApps', JSON.stringify(apps));
                renderApps();
            }
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('addAppModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Inicializar al cargar
        init();

        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado'))
                    .catch(err => console.log('Error al registrar SW:', err));
            });
        }
    </script>
</body>
</html>
